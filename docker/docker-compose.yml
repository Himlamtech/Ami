# 🚀 AmiAgent - All-in-One Docker Compose
# 
# USAGE:
# Production:     docker compose up -d
# Development:    APP_ENV=dev docker compose up -d  
# With Tools:     docker compose --profile tools up -d
# Dev + Tools:    APP_ENV=dev docker compose --profile tools up -d

services:
  # 🎯 FastAPI Application
  amiagent:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-final}
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: amiagent-api
    restart: unless-stopped
    ports:
      - "1912:1912"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=1912
      - DATABASE_URL=postgresql+psycopg://rag:ragpass@postgres:5432/ragdb
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      # 🔥 Development: Conditional source code mount for hot reload
      - type: bind
        source: ${PWD:-.}
        target: /app
        consistency: cached
        read_only: ${APP_ENV:-production}
        bind:
          create_host_path: true
    # Exclude cache and build artifacts from volume mount
    tmpfs:
      - /app/__pycache__:noexec,nosuid,size=100m
      - /app/.pytest_cache:noexec,nosuid,size=50m
    command: >
      sh -c "
      if [ \"$$APP_ENV\" = \"dev\" ]; then
        echo '🔥 Starting in DEVELOPMENT mode with hot reload...';
        uv run uvicorn app.api.main:app --host 0.0.0.0 --port 1912 --reload;
      else
        echo '🚀 Starting in PRODUCTION mode...';
        uv run uvicorn app.api.main:app --host 0.0.0.0 --port 1912;
      fi
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - amiagent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1912/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: amiagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - amiagent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and job queues
  redis:
    image: redis:7-alpine
    container_name: amiagent-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - amiagent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 🛠️ Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: amiagent-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - amiagent-network
    profiles:
      - tools
      - dev

  # 🗄️ pgAdmin for PostgreSQL management  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: amiagent-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@amiagent.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - amiagent-network
    profiles:
      - tools
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  amiagent-network:
    driver: bridge
