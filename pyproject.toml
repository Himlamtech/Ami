[project]
name = "amiagent"
version = "0.1.0"
description = "AmiAgent"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.99.9",
    "pydantic-settings>=2.10.1",
    "rootutils>=1.0.7",
    "fastapi>=0.115.6",
    "uvicorn[standard]>=0.34.0",
    "httpx>=0.28.1",
    "click>=8.2.1",
    "pandas>=2.3.2",
    "langchain>=0.1.0",
    "langchain-openai>=0.1.0",
    "langchain-community>=0.0.10",
    "chromadb>=0.4.0",
    "sentence-transformers>=5.1.0",
    "torch>=2.8.0",
]

[dependency-groups]
dev = [
    "black>=25.1.0",
    "mypy>=1.17.1",
    "ruff>=0.12.9",
    "pre-commit>=4.0.1",
    "bandit>=1.7.10",
    "isort>=5.13.2",
    "pydocstyle>=6.3.0",
    "ipykernel>=6.30.1",
]

