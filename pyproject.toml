[project]
name = "amiagent"
version = "0.1.0"
description = "AmiAgent"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.99.9",
    "pydantic-settings>=2.10.1",
    "rootutils>=1.0.7",
    "fastapi>=0.115.6",
    "uvicorn[standard]>=0.34.0",
    "httpx>=0.28.1",
    "click>=8.2.1",
    "litellm>=1.75.9",
    "google-adk>=1.12.0",
]

[dependency-groups]
dev = [
    "black>=25.1.0",
    "mypy>=1.17.1",
    "ruff>=0.12.9",
]

[tool.mypy]
exclude = ["main.py"]
ignore_missing_imports = true
explicit_package_bases = true
